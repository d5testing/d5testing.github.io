<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>reCAPTCHA Upload Demo</title>

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.0/css/all.css">        
    <style>
        .container { font-family: Roboto, helvetica, arial, sans-serif; }
        .m-p { margin: 0; padding: 0; }
        .block { display: block; }

        .checkbox-window {
            height: 74px;
            width: 300px;
            background-color: #f9f9f9;
            border-radius: 3px;
            border: 1px solid #d3d3d3;
        }

        .checkbox-container { width: 28px; height: 28px; }

        .checkbox {
            background-color: #fff;
            border-radius: 2px;
            height: 100%;
            width: 100%;
            border: 2px solid #c1c1c1;
            margin: 21px 0 0 12px;
            cursor: pointer;
            transition: all 0.4s;
        }

        .im-not-a-robot {
            position: relative;
            left: 52px;
            bottom: 3px;
            font-size: 15px;
        }

        .captcha-logo {
            position: relative;
            left: 244px;
            bottom: 36px;
            width: 40px;
        }

        .spinner {
            visibility: hidden;
            position: relative;
            top: -85px;
            left: 12px;
            height: 20px;
            width: 20px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top: 2px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .verify-window {
            opacity: 0;
            position: absolute;
            visibility: hidden;
            width: 310px;
            background-color: #fff;
            border: 1px solid #cecece;
            box-shadow: 5px 6px 7px -3px rgba(0,0,0,0.12);
            transition: opacity 0.3s;
        }

        .verify-header {
            background-color: #1A73E8;
            padding: 16px;
            color: white;
            font-size: 20px;
        }

        .verify-main {
            padding: 15px;
            text-align: center;
        }

        .upload-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #1A73E8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .upload-btn:hover {
            background: #1558b0;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Fake captcha -->
    <div id="checkbox-window" class="checkbox-window">
        <div class="checkbox-container">
            <button id="checkbox" class="checkbox"></button>
        </div>
        <p class="im-not-a-robot">I'm not a robot</p>
        <img src="RecaptchaLogo.png" class="captcha-logo">
        <div id="spinner" class="spinner"></div>
    </div>

    <!-- Upload panel -->
    <div id="verify-window" class="verify-window">
        <div class="verify-header">Upload a File</div>
        <div class="verify-main">
            <p>Select a file to continue:</p>

            <input type="file" id="file-input" style="display:none">

            <button id="upload-btn" class="upload-btn">
                Upload a File
            </button>

            <p id="file-name" style="margin-top:10px;"></p>
        </div>
    </div>

</div>

<script>
const checkboxBtn = document.getElementById("checkbox");
const spinner = document.getElementById("spinner");
const verifyWindow = document.getElementById("verify-window");

function showSpinner() {
    spinner.style.visibility = "visible";
}

function hideSpinner() {
    spinner.style.visibility = "hidden";
}

function showVerifyWindow() {
    verifyWindow.style.visibility = "visible";
    verifyWindow.style.opacity = "1";
    verifyWindow.style.top = "100px";
    verifyWindow.style.left = "20px";
}

// Checkbox click flow
checkboxBtn.addEventListener("click", () => {
    checkboxBtn.disabled = true;

    showSpinner();

    setTimeout(() => {
        hideSpinner();
        showVerifyWindow();
    }, 1000);
});

// Upload logic
const uploadBtn = document.getElementById("upload-btn");
const fileInput = document.getElementById("file-input");
const fileNameDisplay = document.getElementById("file-name");

uploadBtn.addEventListener("click", () => {
    fileInput.click();
});

fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        fileNameDisplay.textContent =
            "Selected file: " + fileInput.files[0].name;
    }
});
</script>

</body>
</html>
