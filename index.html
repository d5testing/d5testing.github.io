<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>reCAPTCHA Verification (Simulation)</title>

<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.0/css/all.css">

<style>
.container { font-family: Roboto, helvetica, arial, sans-serif; }
.m-p { margin: 0; padding: 0; }
.block { display: block; }

.checkbox-window {
    height: 74px; width: 300px;
    background-color: #f9f9f9;
    border-radius: 3px;
    border: 1px solid #d3d3d3;
}

.checkbox {
    background: #fff;
    border: 2px solid #c1c1c1;
    height: 28px; width: 28px;
    margin: 21px 0 0 12px;
    cursor: pointer;
}

.im-not-a-robot {
    position: relative;
    left: 52px; bottom: 20px;
    font-size: 15px;
}

.verify-window {
    opacity: 0;
    position: absolute;
    visibility: hidden;
    width: 310px;
    background: #fff;
    border: 1px solid #cecece;
    box-shadow: 5px 6px 7px -3px rgba(0,0,0,0.12);
    transition: opacity 400ms;
}

.verify-header {
    background: #1A73E8;
    color: white;
    padding: 16px;
}

.verify-main { padding: 10px; }

.verify-footer {
    border-top: 1px solid #cecece;
    padding: 10px;
}

.verify-verify-button {
    background: #5a89e2;
    color: white;
    padding: 10px;
    width: 100%;
    border: none;
    cursor: pointer;
}

code {
    font-size: 11px;
    display: block;
    margin-top: 10px;
    background: #f1f1f1;
    padding: 5px;
}
</style>
</head>

<body>

<div class="container">

    <div id="checkbox-window" class="checkbox-window">
        <button id="checkbox" class="checkbox"></button>
        <p class="im-not-a-robot">I'm not a robot</p>
    </div>

    <div id="verify-window" class="verify-window">
        <div class="verify-header">
            <b>Security Verification Simulation</b>
        </div>

        <div class="verify-main">
            <p>This is a <b>safe red-team simulation</b>.</p>

            <ol>
                <li>Click <b>Verify</b> to copy the test command.</li>
                <li>Open PowerShell manually.</li>
                <li>Paste and run inside your lab.</li>
            </ol>

            <p><b>Command:</b></p>
            <code id="command-display"></code>
        </div>

        <div class="verify-footer">
            <button id="verify-btn" class="verify-verify-button">
                Copy Command
            </button>
        </div>
    </div>

</div>

<script>
let checkboxBtn = document.getElementById("checkbox");
let verifywindow = document.getElementById("verify-window");
let verifyBtn = document.getElementById("verify-btn");
let commandDisplay = document.getElementById("command-display");

// ✅ Safe PowerShell command
const safeCommand = 'powershell -NoProfile -Command "whoami"';

checkboxBtn.addEventListener("click", () => {
    showVerifyWindow();
});

function showVerifyWindow() {
    verifywindow.style.display = "block";
    verifywindow.style.visibility = "visible";
    verifywindow.style.opacity = "1";
    verifywindow.style.top = "100px";
    verifywindow.style.left = "50px";

    // ✅ show command (transparent)
    commandDisplay.textContent = safeCommand;
}

// ✅ Explicit user consent clipboard copy
verifyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(safeCommand).then(() => {
        alert("✅ Command copied.\nRun it manually in your PowerShell lab.");
    });
});
</script>

</body>
</html>
